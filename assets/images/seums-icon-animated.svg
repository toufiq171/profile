<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SEUMS animated icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131f"/>
      <stop offset="1" stop-color="#0f6f66"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8ff7dd"/>
      <stop offset="1" stop-color="#7bb9ff"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#c5f7ef" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="6" y="6" width="244" height="244" rx="56" fill="url(#bg)"/>

  <g transform="translate(128 128)">
    <circle r="86" fill="none" stroke="#5fe2d2" stroke-opacity="0.12" stroke-width="2"/>
    <circle r="64" fill="none" stroke="url(#ring)" stroke-width="5" stroke-linecap="round" filter="url(#soft-glow)" stroke-dasharray="220 186">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.55;0.95;0.55" dur="2.6s" repeatCount="indefinite"/>
    </circle>

    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="5.4s" repeatCount="indefinite"/>
      <circle cx="64" cy="0" r="7" fill="#b5fbf2"/>
      <circle cx="-51" cy="38" r="5" fill="#98dcff"/>
      <circle cx="-23" cy="-60" r="6" fill="#d1ffee"/>
    </g>

    <circle r="38" fill="url(#core)" opacity="0.24">
      <animate attributeName="r" values="36;40;36" dur="2.2s" repeatCount="indefinite"/>
    </circle>

    <text x="0" y="14" text-anchor="middle" font-size="86" font-family="Verdana, Trebuchet MS, sans-serif" font-weight="700" fill="#ecfffb">S</text>
  </g>
</svg>
